name: CI/CD Pipeline

on:
  push:
    branches:
      - development
      - feature/**

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Install dependencies
        run: npm install --frozen-lockfile
      - name: Build affected packages
        run: npx turbo run build --filter=...[HEAD^1]

  test:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v3
      - run: npm install --frozen-lockfile
      - name: Run tests
        run: npx turbo run test --filter=...[HEAD^1]

  lint:
    runs-on: ubuntu-latest
    needs: build          # parallel with test
    steps:
      - uses: actions/checkout@v3
      - run: npm install --frozen-lockfile
      - name: Run lint
        run: npx turbo run lint --filter=...[HEAD^1]

  deploy:
    runs-on: ubuntu-latest
    needs: [test, lint]   # waits for both
    steps:
      - uses: actions/checkout@v3
      - run: npm install --frozen-lockfile
      - name: Deploy to Staging
        if: github.ref == 'refs/heads/development'
        run: npx turbo run deploy --filter=packages/api -- --env=staging

  monitor:
    runs-on: ubuntu-latest
    needs: deploy
    steps:
      - uses: actions/checkout@v3
      - run: npm install --frozen-lockfile
      - name: Monitor
        run: npx turbo run monitor --filter=packages/api